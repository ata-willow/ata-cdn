<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Ata">
  <meta name="theme-color" content="#FAF8F5">
  <link rel="manifest" href="https://ata-willow.github.io/ata-cdn/manifest.json">
  <link rel="apple-touch-icon" href="https://ata-willow.github.io/ata-cdn/icons/icon-192.png">
  <link rel="icon" type="image/png" href="https://ata-willow.github.io/ata-cdn/icons/icon-192.png">
  <title>Ata - Learning Assistant</title>
  <base href="https://atahelp.pythonanywhere.com/">
  <link rel="preload" href="https://ata-willow.github.io/ata-cdn/static/css/style2.min.css?v=1784433733" as="style">
  <link rel="stylesheet" href="https://ata-willow.github.io/ata-cdn/static/css/style2.min.css?v=1784433733">
</head>
<body>
  <div id="app">
    <div style="padding:40px;text-align:center;color:#666;">
      <p>⏳ 正在加载 Ata...</p>
    </div>
  </div>
  <script>
    // Force unregister all service workers
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(regs) {
        regs.forEach(function(reg) { reg.unregister(); });
      });
    }
    // Clear all caches
    if ('caches' in window) {
      caches.keys().then(function(keys) {
        keys.forEach(function(key) { caches.delete(key); });
      });
    }
    // Global error handler
    window.onerror = function(msg, url, line, col, error) {
      document.getElementById('app').innerHTML = '<div style="padding:20px;color:red;">JS错误: ' + msg + '<br>' + url + ':' + line + '<br><pre>' + (error && error.stack ? error.stack : '') + '</pre></div>';
      return false;
    };
    window.onunhandledrejection = function(e) {
      document.getElementById('app').innerHTML = '<div style="padding:20px;color:red;">Promise错误: ' + e.reason + '<br><pre>' + (e.reason && e.reason.stack ? e.reason.stack : '') + '</pre></div>';
    };
    // Fallback: if JS doesn't initialize the app within 10 seconds, show diagnostic
    setTimeout(function() {
      var app = document.getElementById('app');
      if (app && app.querySelector('p') && app.querySelector('p').textContent.indexOf('加载') !== -1) {
        app.innerHTML = '<div style="padding:20px;color:#e74c3c;font-size:14px;line-height:1.8;">' +
          '<p><b>⚠️ 页面加载超时</b></p>' +
          '<p>JS文件可能未加载完成。请尝试：</p>' +
          '<ol style="padding-left:20px;">' +
          '<li>强制刷新页面（长按刷新按钮）</li>' +
          '<li>清除浏览器缓存后重试</li>' +
          '<li>使用无痕/隐私模式打开</li>' +
          '<li>切换网络（WiFi/移动数据）后重试</li>' +
          '</ol>' +
          '<p style="color:#999;font-size:12px;margin-top:16px;">' +
          '诊断：HTML已加载，但JS未执行。' +
          '当前时间: ' + new Date().toLocaleString() +
          '</p></div>';
      }
    }, 10000);
  </script>

  <script src="static/js/appv4.min.js?v=1784433733" defer></script></body>
</html>
